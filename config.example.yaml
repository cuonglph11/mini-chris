adapter: cursor                    # cursor | copilot
model: auto                        # model name or "auto"
cwd: .                             # default working directory
workspace: ./workspace             # path to workspace dir
maxToolRounds: 50                  # max tool call rounds per turn

# Embedding for memory search (local-first by default)
embedding:
  provider: ollama                         # ollama | copilot | openai | keyword
  model: text-embedding-3-small            # OpenAI model (only used when provider=openai)
  apiKey: ${OPENAI_API_KEY}                # env var reference (only used when provider=openai)
  providerOrder:                           # fallback chain — tried in order until one works
    - ollama                               # local Ollama (run models/setup.sh first)
    - copilot                              # GitHub Copilot embeddings
    - openai                               # OpenAI API (requires apiKey)
    - keyword                              # keyword matching (no API needed, always works)
  ollamaHost: http://localhost:11434       # Ollama server URL
  # vectraPath: ./workspace/.vectra        # custom path for Vectra vector DB index

# Adapter-specific
cursor:
  binary: cursor                   # path to cursor binary (optional)

copilot:
  auth: gh                         # "gh" (use gh CLI auth) or "token"
  # token: ${GITHUB_TOKEN}         # only if auth=token
